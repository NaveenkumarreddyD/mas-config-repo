merge-key: "mas/drroc4/drgitopsapp"

ibm_mas_suite_configs:
  - mas_config_name: "drgitopsapp-sls-system"
    mas_config_chart: ibm-mas-sls-config
    mas_config_scope: system
    mas_workspace_id:
    mas_application_id:
    mas_config_kind: "slscfgs"
    mas_config_api_version: "config.mas.ibm.com"
    use_postdelete_hooks: true
    registration_key: "<path:secret/data/mas/drroc4/drgitopsapp/sls#registration_key>"
    url: "<path:secret/data/mas/drroc4/drgitopsapp/sls#url>"
    ca:
      crt: "<path:secret/data/mas/drroc4/drgitopsapp/sls#ca.crt>"

  - mas_config_name: "drgitopsapp-bas-system"
    mas_config_chart: ibm-mas-bas-config
    mas_config_scope: system
    mas_workspace_id:
    mas_application_id:
    mas_config_kind: "bascfgs"
    mas_config_api_version: "config.mas.ibm.com"
    use_postdelete_hooks: true
    dro_endpoint_url: "<path:secret/data/mas/drroc4/drgitopsapp/dro#url>"
    dro_contact:
      email: "Najeeb.Mehboob@spireenergy.com"
      first_name: "Najeeb"
      last_name: "Mehboob"
    dro_api_token: "<path:secret/data/mas/drroc4/drgitopsapp/dro#api_token>"
    dro_ca:
      crt: "<path:secret/data/mas/drroc4/drgitopsapp/dro#ca.crt>"

  - mas_config_name: "drgitopsapp-mongo-system"
    mas_config_chart: ibm-mas-mongo-config
    mas_config_scope: system
    mas_workspace_id:
    mas_application_id:
    mas_config_kind: "mongocfgs"
    mas_config_api_version: "config.mas.ibm.com"
    use_postdelete_hooks: true
    username: "<path:secret/data/mas/drroc4/drgitopsapp/mongo#username>"
    password: "<path:secret/data/mas/drroc4/drgitopsapp/mongo#password>"
    config:
      hosts:
        - host: "<path:secret/data/mas/drroc4/drgitopsapp/mongo#host>"
          port: 27017
      configDb: admin
      authMechanism: DEFAULT
      retryWrites: false
      credentials:
        secretName: "system-mongo-credentials"
    certificates:
      - alias: ca
        crt: "<path:secret/data/mas/drroc4/drgitopsapp/mongo#ca.crt>"

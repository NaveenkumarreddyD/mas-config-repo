merge-key: "mas/drroc4/drgitopsapp"

ibm_mas_masapp_configs:
  - mas_app_id: manage
    mas_app_namespace: mas-drgitopsapp-manage
    mas_app_ws_apiversion: apps.mas.ibm.com/v1
    mas_app_ws_kind: ManageWorkspace
    mas_workspace_id: drgitopswks

    mas_manual_cert_mgmt: true
    run_sanity_test: false

    # Per-bundle Liberty server.xml (JMS client config for ui + cron). Set in config, NOT the UI
    # (ArgoCD reverts UI edits to the ManageWorkspace). Chart creates Secrets drgitopswks-manage-d--sb0--asc--sn (ui) and drgitopswks-manage-d--sb1--asc--sn (cron).
    mas_app_server_bundles_combined_add_server_config:
      drgitopswks-manage-d--sb0--asc--sn:   ""
      drgitopswks-manage-d--sb1--asc--sn: ""

    mas_appws_spec:
      bindings:
        jdbc: system
      components:
        base:
          version: latest
        # hse = Health, Safety & Environment Manager (the rebranded Maximo for Oil & Gas).
        # It ships the psdi.plusg.* classes (e.g. PlusGPersonSet). REQUIRED to match prod, whose
        # data registers PERSON/other objects to plusg classes -> without hse the server can't
        # load PlusGPersonSet at startup and crashes. Must match prod components exactly.
        hse:
          version: latest
        oracleadapter:
          version: latest
        utilities:
          version: latest
        spatial:
          version: latest
      settings:
        aio:
          install: false
        db:
          dbSchema: maximo
          encryptionSecret: drgitopswks-manage-encryptionsecret
          maxinst:
            tableSpace: MAX_DATA
            indexSpace: MAX_INDEX
            demodata: false
            bypassUpgradeVersionCheck: false
        languages:
          baseLang: EN
          secondaryLangs: []
        customizationList: []
        # Per IBM docs the pod resources block lives at settings.resources (NOT
        # settings.deployment.resources). At the wrong path the ManageWorkspace structural
        # schema prunes it on apply -> live CR never gets it -> permanent ArgoCD OutOfSync.
        resources:
          serverBundles:
            requests: { cpu: "1", memory: "4Gi" }
            limits:   { cpu: "6", memory: "10Gi" }
        deployment:
          autoGenerateEncryptionKeys: true
          defaultJMS: false
          serverTimezone: America/Chicago
          persistentVolumes:
            - { pvcName: jmsstore,  mountPath: /jmsstore,  size: 20Gi,  storageClassName: isilon, accessModes: [ReadWriteMany] }
            - { pvcName: globaldir, mountPath: /globaldir, size: 20Gi, storageClassName: isilon, accessModes: [ReadWriteMany] }
          serverBundles:
            - name: ui
              bundleType: ui
              isDefault: true
              isMobileTarget: true
              replica: 2
              routeSubDomain: ui
              additionalServerConfig: { secretName: drgitopswks-manage-d--sb0--asc--sn }
            - name: cron
              bundleType: cron
              isDefault: false
              replica: 1
              routeSubDomain: cron
              additionalServerConfig: { secretName: drgitopswks-manage-d--sb1--asc--sn }
            - name: mea
              bundleType: mea
              isDefault: false
              isUserSyncTarget: true
              replica: 2
              routeSubDomain: mea
            - name: report
              bundleType: report
              isDefault: false
              replica: 1
              routeSubDomain: report
            - name: jms
              bundleType: standalonejms
              isDefault: false
              replica: 1
              routeSubDomain: jms

    storage_class_definitions: {}

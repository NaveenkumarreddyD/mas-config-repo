merge-key: "mas/drroc4/drgitopsapp"

ibm_mas_masapp_configs:
  - mas_app_id: manage
    mas_app_namespace: mas-drgitopsapp-manage
    mas_app_ws_apiversion: apps.mas.ibm.com/v1
    mas_app_ws_kind: ManageWorkspace
    mas_workspace_id: drgitopswks

    mas_manual_cert_mgmt: true
    run_sanity_test: false

    mas_appws_spec:
      bindings:
        jdbc: system
      components:
        base:
          version: latest
        utilities:
          version: latest
        spatial:
          version: latest
      settings:
        aio:
          install: false
        db:
          dbSchema: maximo
          encryptionSecret: drgitopswks-manage-encryptionsecret
          maxinst:
            tableSpace: MAX_DATA
            indexSpace: MAX_INDEX
            demodata: false
            bypassUpgradeVersionCheck: false
        languages:
          baseLang: EN
          secondaryLangs: []
        customizationList: []
        deployment:
          autoGenerateEncryptionKeys: true
          defaultJMS: false
          serverTimezone: America/Chicago
          resources:
            serverBundles:
              requests: { cpu: "1", memory: "4Gi" }
              limits:   { cpu: "6", memory: "10Gi" }
          persistentVolumes:
            - { pvcName: jmsstore,  mountPath: /jmsstore,  size: 20Gi,  storageClassName: isilon, accessModes: [ReadWriteMany] }
            - { pvcName: globaldir, mountPath: /globaldir, size: 20Gi, storageClassName: isilon, accessModes: [ReadWriteMany] }
          serverBundles:
            - { name: ui,     bundleType: ui,            isDefault: true,  isMobileTarget: true,   replica: 2, routeSubDomain: ui }
            - { name: cron,   bundleType: cron,          isDefault: false, replica: 1, routeSubDomain: cron }
            - { name: mea,    bundleType: mea,           isDefault: false, isUserSyncTarget: true,  replica: 2, routeSubDomain: mea }
            - { name: report, bundleType: report,        isDefault: false, replica: 1, routeSubDomain: report }
            - { name: jms,    bundleType: standalonejms, isDefault: false, replica: 1, routeSubDomain: jms }

    storage_class_definitions: {}
